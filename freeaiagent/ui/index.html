<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>freeaiagent</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #0f0f0f;
      --sidebar: #171717;
      --surface: #1e1e1e;
      --border: #2a2a2a;
      --text: #e5e5e5;
      --dim: #888;
      --accent: #10a37f;
      --danger: #e34c4c;
    }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: var(--bg);
      color: var(--text);
      height: 100vh;
      display: flex;
      overflow: hidden;
      font-size: 14px;
    }

    /* ── Sidebar ─────────────────────────────────────────── */
    #sidebar {
      width: 256px;
      background: var(--sidebar);
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      flex-shrink: 0;
    }
    #new-chat {
      margin: 12px;
      padding: 9px 14px;
      background: transparent;
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--text);
      cursor: pointer;
      font-size: 13px;
      text-align: left;
      display: flex;
      align-items: center;
      gap: 8px;
      transition: background 0.15s;
    }
    #new-chat:hover { background: var(--surface); }
    #session-list { flex: 1; overflow-y: auto; padding: 4px; }
    .session-item {
      padding: 9px 10px;
      border-radius: 7px;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 6px;
      transition: background 0.12s;
      min-width: 0;
    }
    .session-item:hover { background: var(--surface); }
    .session-item.active { background: var(--surface); }
    .session-title {
      flex: 1;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      font-size: 13px;
    }
    .session-del {
      opacity: 0;
      flex-shrink: 0;
      background: none;
      border: none;
      color: var(--dim);
      cursor: pointer;
      font-size: 15px;
      line-height: 1;
      padding: 2px 4px;
      border-radius: 4px;
      transition: opacity 0.12s, color 0.12s;
    }
    .session-item:hover .session-del { opacity: 1; }
    .session-del:hover { color: var(--danger); }
    .session-title-input {
      flex: 1;
      background: transparent;
      border: none;
      outline: 1px solid var(--accent);
      border-radius: 4px;
      color: var(--text);
      font-size: 13px;
      padding: 1px 4px;
      min-width: 0;
    }
    #sidebar-footer {
      padding: 10px 14px;
      font-size: 11px;
      color: var(--dim);
      border-top: 1px solid var(--border);
    }

    /* ── Main ────────────────────────────────────────────── */
    #main { flex: 1; display: flex; flex-direction: column; overflow: hidden; min-width: 0; }

    #topbar {
      padding: 10px 20px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      gap: 10px;
      flex-shrink: 0;
    }
    #topbar-title { flex: 1; font-size: 13px; color: var(--dim); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    #model-select {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 7px;
      color: var(--text);
      font-size: 12px;
      padding: 5px 8px;
      cursor: pointer;
      max-width: 240px;
    }
    #model-select:focus { outline: 1px solid var(--accent); }

    /* ── Messages ────────────────────────────────────────── */
    #messages { flex: 1; overflow-y: auto; padding: 20px 0 8px; }
    #empty-state {
      text-align: center;
      color: var(--dim);
      margin-top: 80px;
      padding: 0 24px;
    }
    #empty-state h2 { font-size: 22px; font-weight: 600; color: var(--text); margin-bottom: 8px; }
    #empty-state p { font-size: 13px; line-height: 1.6; }
    .msg { max-width: 740px; margin: 0 auto; padding: 6px 24px; display: flex; gap: 10px; }
    .msg.user { flex-direction: row-reverse; }
    .avatar {
      width: 30px; height: 30px; border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 11px; font-weight: 600; flex-shrink: 0; margin-top: 3px;
    }
    .msg.user .avatar { background: var(--accent); color: #fff; }
    .msg.assistant .avatar { background: var(--border); color: var(--text); }
    .bubble {
      padding: 10px 14px;
      border-radius: 12px;
      font-size: 14px;
      line-height: 1.65;
      white-space: pre-wrap;
      word-break: break-word;
      max-width: 82%;
    }
    .msg.user .bubble { background: var(--surface); border-radius: 12px 12px 2px 12px; }
    .msg.assistant .bubble { background: transparent; border-radius: 12px 12px 12px 2px; }
    .loading .bubble { color: var(--dim); }
    .loading .bubble::after { content: '▍'; animation: blink 0.9s step-end infinite; }
    @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0; } }

    /* ── Image thumbnail in user bubbles ────────────────── */
    .bubble-img {
      max-width: 220px;
      max-height: 160px;
      border-radius: 8px;
      display: block;
      margin-bottom: 6px;
      object-fit: cover;
    }

    /* ── Input ───────────────────────────────────────────── */
    #input-area { padding: 12px 24px 20px; flex-shrink: 0; }
    #input-inner { max-width: 740px; margin: 0 auto; }

    /* Image preview strip above the input box */
    #img-preview {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 6px 4px;
    }
    #img-preview img {
      height: 52px;
      width: 52px;
      object-fit: cover;
      border-radius: 7px;
      border: 1px solid var(--border);
    }
    #img-preview-label {
      font-size: 12px;
      color: var(--dim);
      flex: 1;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    #img-remove {
      background: none;
      border: none;
      color: var(--dim);
      cursor: pointer;
      font-size: 17px;
      line-height: 1;
      padding: 2px 4px;
      border-radius: 4px;
      transition: color 0.12s;
    }
    #img-remove:hover { color: var(--danger); }

    #input-wrap {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      display: flex; align-items: flex-end; gap: 8px;
      padding: 8px 10px 8px 10px;
      transition: border-color 0.15s;
    }
    #input-wrap:focus-within { border-color: #444; }
    #attach-btn {
      background: none;
      border: none;
      color: var(--dim);
      cursor: pointer;
      padding: 4px 6px;
      border-radius: 6px;
      flex-shrink: 0;
      transition: color 0.12s, background 0.12s;
      display: flex;
      align-items: center;
    }
    #attach-btn:hover { color: var(--text); background: var(--border); }
    #msg-input {
      flex: 1;
      background: transparent; border: none;
      color: var(--text); font-size: 14px; font-family: inherit;
      resize: none; max-height: 180px; line-height: 1.5; outline: none;
      padding-left: 4px;
    }
    #msg-input::placeholder { color: var(--dim); }
    #send-btn {
      background: var(--accent); border: none; border-radius: 7px;
      color: #fff; width: 30px; height: 30px; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0; transition: opacity 0.15s;
    }
    #send-btn:disabled { opacity: 0.35; cursor: not-allowed; }
    #send-btn svg { display: block; }

    /* ── Scrollbar ───────────────────────────────────────── */
    ::-webkit-scrollbar { width: 5px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
  </style>
</head>
<body>

<!-- Hidden file input for image attachment -->
<input type="file" id="img-file" accept="image/*" style="display:none">

<div id="sidebar">
  <button id="new-chat">＋ New Chat</button>
  <div id="session-list"></div>
  <div id="sidebar-footer">freeaiagent · localhost:7731</div>
</div>

<div id="main">
  <div id="topbar">
    <span id="topbar-title">freeaiagent</span>
    <select id="model-select"><option>Loading…</option></select>
  </div>
  <div id="messages">
    <div id="empty-state">
      <h2>freeaiagent</h2>
      <p>Select a chat or start a new one.<br>Pick any model from the dropdown above.</p>
    </div>
  </div>
  <div id="input-area">
    <div id="input-inner">
      <div id="img-preview" hidden>
        <img id="img-preview-thumb" src="" alt="preview">
        <span id="img-preview-label">image attached</span>
        <button id="img-remove" title="Remove image">×</button>
      </div>
      <div id="input-wrap">
        <button id="attach-btn" title="Attach image (SDX backends)">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M21.44 11.05l-9.19 9.19a6 6 0 0 1-8.49-8.49l9.19-9.19a4 4 0 0 1 5.66 5.66l-9.2 9.19a2 2 0 0 1-2.83-2.83l8.49-8.48"/>
          </svg>
        </button>
        <textarea id="msg-input" rows="1" placeholder="Message…"></textarea>
        <button id="send-btn" disabled>
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
            <line x1="12" y1="19" x2="12" y2="5"/><polyline points="5 12 12 5 19 12"/>
          </svg>
        </button>
      </div>
    </div>
  </div>
</div>

<script>
'use strict';
let activeSession = null;
let sessions = [];
let pendingImageB64 = null;   // base64 data-URI of attached image, or null
let pendingImageName = '';

// ── Utils ─────────────────────────────────────────────────

function uuid() {
  return ([1e7]+-1e3+-4e3+-8e3+-1e11).replace(/[018]/g, c =>
    (c ^ crypto.getRandomValues(new Uint8Array(1))[0] & 15 >> c / 4).toString(16)
  );
}

async function api(method, path, body) {
  const opts = { method, headers: { 'Content-Type': 'application/json' } };
  if (body !== undefined) opts.body = JSON.stringify(body);
  const r = await fetch(path, opts);
  if (!r.ok) {
    const txt = await r.text();
    throw new Error(txt || r.statusText);
  }
  return r.json();
}

// ── Image attachment ──────────────────────────────────────

document.getElementById('attach-btn').onclick = () => {
  document.getElementById('img-file').click();
};

document.getElementById('img-file').addEventListener('change', function() {
  const file = this.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = e => {
    pendingImageB64 = e.target.result;   // data:image/...;base64,...
    pendingImageName = file.name;
    document.getElementById('img-preview-thumb').src = pendingImageB64;
    document.getElementById('img-preview-label').textContent = file.name;
    document.getElementById('img-preview').hidden = false;
    // enable send if there's also text, or just image alone
    document.getElementById('send-btn').disabled = false;
  };
  reader.readAsDataURL(file);
  this.value = '';  // allow re-selecting same file
});

document.getElementById('img-remove').onclick = () => {
  pendingImageB64 = null;
  pendingImageName = '';
  document.getElementById('img-preview').hidden = true;
  document.getElementById('img-preview-thumb').src = '';
  const input = document.getElementById('msg-input');
  document.getElementById('send-btn').disabled = !input.value.trim();
};

// ── Models ────────────────────────────────────────────────

async function loadModels() {
  try {
    const { models } = await api('GET', '/models');
    const sel = document.getElementById('model-select');
    sel.innerHTML = '';
    if (!models || !models.length) {
      sel.innerHTML = '<option value="">No models — check freeaiagent keys</option>';
      return;
    }
    models.forEach(m => {
      const o = document.createElement('option');
      o.value = o.textContent = m;
      sel.appendChild(o);
    });
    // Restore model for active session
    const s = sessions.find(s => s.id === activeSession);
    if (s && s.model && [...sel.options].some(o => o.value === s.model)) {
      sel.value = s.model;
    }
  } catch (e) {
    console.error('loadModels', e);
  }
}

// ── Sessions sidebar ──────────────────────────────────────

async function loadSessions() {
  try {
    const data = await api('GET', '/sessions');
    sessions = data.sessions || [];
    renderSidebar();
  } catch (e) {
    console.error('loadSessions', e);
  }
}

function renderSidebar() {
  const list = document.getElementById('session-list');
  list.innerHTML = '';
  sessions.forEach(s => {
    const item = document.createElement('div');
    item.className = 'session-item' + (s.id === activeSession ? ' active' : '');
    item.dataset.id = s.id;

    const titleEl = document.createElement('span');
    titleEl.className = 'session-title';
    titleEl.title = s.title;
    titleEl.textContent = s.title;

    const del = document.createElement('button');
    del.className = 'session-del';
    del.title = 'Delete';
    del.textContent = '×';
    del.onclick = async e => {
      e.stopPropagation();
      if (!confirm(`Delete "${s.title}"?`)) return;
      try {
        await api('DELETE', `/sessions/${s.id}`);
        if (activeSession === s.id) { activeSession = null; clearChat(); }
        await loadSessions();
      } catch (e) { alert('Delete failed: ' + e.message); }
    };

    // Double-click title to rename inline
    titleEl.ondblclick = e => {
      e.stopPropagation();
      const inp = document.createElement('input');
      inp.className = 'session-title-input';
      inp.value = s.title === 'New Chat' ? '' : s.title;
      inp.onclick = e => e.stopPropagation();
      const finish = async () => {
        const val = inp.value.trim();
        if (val && val !== s.title) {
          await api('PATCH', `/sessions/${s.id}`, { title: val });
          s.title = val;
        }
        await loadSessions();
      };
      inp.onkeydown = async e => {
        if (e.key === 'Enter') { e.preventDefault(); await finish(); }
        if (e.key === 'Escape') { await loadSessions(); }
      };
      inp.onblur = finish;
      titleEl.replaceWith(inp);
      inp.focus(); inp.select();
    };

    item.onclick = () => switchSession(s.id);
    item.appendChild(titleEl);
    item.appendChild(del);
    list.appendChild(item);
  });

  // Update topbar title
  const active = sessions.find(s => s.id === activeSession);
  document.getElementById('topbar-title').textContent = active ? active.title : 'freeaiagent';
}

async function switchSession(id) {
  activeSession = id;
  renderSidebar();
  const msgs = document.getElementById('messages');
  msgs.innerHTML = '';
  try {
    const { messages } = await api('GET', `/context?session=${encodeURIComponent(id)}`);
    if (!messages.length) { showEmpty(); return; }
    messages.forEach(m => {
      if (m.role !== 'system') appendBubble(m.role, m.content);
    });
    msgs.scrollTop = msgs.scrollHeight;
    // Restore session model
    const s = sessions.find(s => s.id === id);
    if (s && s.model) {
      const sel = document.getElementById('model-select');
      if ([...sel.options].some(o => o.value === s.model)) sel.value = s.model;
    }
  } catch (e) {
    msgs.innerHTML = `<div id="empty-state"><p style="color:var(--danger)">Failed to load session: ${e.message}</p></div>`;
  }
}

// ── Chat area ─────────────────────────────────────────────

function showEmpty() {
  const msgs = document.getElementById('messages');
  if (!msgs.querySelector('#empty-state')) {
    msgs.innerHTML = '<div id="empty-state"><h2>freeaiagent</h2><p>Send a message to start the conversation.</p></div>';
  }
}

function clearChat() {
  document.getElementById('messages').innerHTML = '';
  showEmpty();
  document.getElementById('topbar-title').textContent = 'freeaiagent';
}

function appendBubble(role, content, loading = false, imageB64 = null) {
  document.getElementById('empty-state')?.remove();
  const msgs = document.getElementById('messages');
  const wrap = document.createElement('div');
  wrap.className = `msg ${role}${loading ? ' loading' : ''}`;

  const av = document.createElement('div');
  av.className = 'avatar';
  av.textContent = role === 'user' ? 'U' : 'AI';

  const bubble = document.createElement('div');
  bubble.className = 'bubble';

  if (imageB64) {
    const img = document.createElement('img');
    img.className = 'bubble-img';
    img.src = imageB64;
    img.alt = 'attached image';
    bubble.appendChild(img);
  }

  if (!loading && content) {
    const txt = document.createTextNode(content);
    bubble.appendChild(txt);
  }

  wrap.appendChild(av);
  wrap.appendChild(bubble);
  msgs.appendChild(wrap);
  msgs.scrollTop = msgs.scrollHeight;
  return { el: wrap, bubble };
}

// ── Streaming chat ────────────────────────────────────────

async function streamChat(text, imageB64) {
  const model = document.getElementById('model-select').value;
  const payload = {
    message: text,
    session_id: activeSession,
    model: model || undefined,
  };
  if (imageB64) payload.image = imageB64;

  const resp = await fetch('/chat/stream', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify(payload),
  });

  if (!resp.ok) {
    const txt = await resp.text();
    throw new Error(txt || resp.statusText);
  }

  return resp.body.getReader();
}

async function sendMessage() {
  const input = document.getElementById('msg-input');
  const text = input.value.trim();
  const imgB64 = pendingImageB64;

  if (!text && !imgB64) return;

  if (!activeSession) activeSession = uuid();

  input.value = '';
  autoResize();
  document.getElementById('send-btn').disabled = true;

  // Clear image preview
  pendingImageB64 = null;
  pendingImageName = '';
  document.getElementById('img-preview').hidden = true;
  document.getElementById('img-preview-thumb').src = '';

  appendBubble('user', text || '', false, imgB64);
  const { el: loadEl, bubble: loadBubble } = appendBubble('assistant', '', true);

  try {
    const reader = await streamChat(text || '', imgB64);
    const decoder = new TextDecoder();
    let buf = '';
    let accumulated = '';

    while (true) {
      const { done, value } = await reader.read();
      if (done) break;
      buf += decoder.decode(value, { stream: true });
      const lines = buf.split('\n');
      buf = lines.pop();  // keep incomplete line
      for (const line of lines) {
        if (!line.startsWith('data: ')) continue;
        const raw = line.slice(6).trim();
        if (raw === '[DONE]') break;
        let ev;
        try { ev = JSON.parse(raw); } catch { continue; }

        if (ev.analyzing) {
          loadBubble.textContent = ev.message || 'Analyzing image…';
        } else if (ev.token) {
          if (loadEl.classList.contains('loading')) {
            loadEl.classList.remove('loading');
            loadBubble.textContent = '';
          }
          accumulated += ev.token;
          loadBubble.textContent = accumulated;
          document.getElementById('messages').scrollTop = document.getElementById('messages').scrollHeight;
        } else if (ev.error) {
          throw new Error(ev.error);
        }
      }
    }
    await loadSessions();
  } catch (e) {
    loadEl.classList.remove('loading');
    loadBubble.textContent = '';
    const errNode = document.createTextNode('⚠ ' + e.message);
    loadBubble.appendChild(errNode);
    loadBubble.style.color = 'var(--danger)';
  }

  document.getElementById('send-btn').disabled = !input.value.trim() && !pendingImageB64;
  input.focus();
}

// ── Input auto-resize ─────────────────────────────────────

function autoResize() {
  const el = document.getElementById('msg-input');
  el.style.height = 'auto';
  el.style.height = Math.min(el.scrollHeight, 180) + 'px';
}

// ── Boot ──────────────────────────────────────────────────

document.getElementById('new-chat').onclick = () => {
  activeSession = uuid();
  clearChat();
  renderSidebar();
};

document.getElementById('msg-input').addEventListener('input', function() {
  autoResize();
  document.getElementById('send-btn').disabled = !this.value.trim() && !pendingImageB64;
});

document.getElementById('msg-input').addEventListener('keydown', e => {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
});

document.getElementById('send-btn').onclick = sendMessage;

loadSessions();
loadModels();
</script>
</body>
</html>
