<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="760" viewBox="0 0 1080 760" font-family="Segoe UI, Helvetica, Arial, sans-serif">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0 0 L10 5 L0 10 z" fill="#9AA0A6"/>
    </marker>
  </defs>

  <!-- background -->
  <rect x="0" y="0" width="1080" height="760" fill="#FFFFFF"/>

  <!-- title -->
  <text x="540" y="42" text-anchor="middle" font-size="26" font-weight="700" fill="#202124">freeaiagent — Architecture at a Glance</text>
  <text x="540" y="70" text-anchor="middle" font-size="14" fill="#5F6368">One pip install. One local HTTP service. Any app can call it.</text>

  <!-- ===== LAYER 1: YOUR APPS ===== -->
  <text x="60" y="106" font-size="12" font-weight="700" letter-spacing="1.5" fill="#5F6368">YOUR APPS</text>

  <!-- client boxes -->
  <g>
    <rect x="60"  y="116" width="210" height="64" rx="10" fill="#E8F0FE" stroke="#4285F4" stroke-width="1.5"/>
    <text x="165" y="146" text-anchor="middle" font-size="15" font-weight="600" fill="#1A3A6B">Your web app</text>
    <text x="165" y="166" text-anchor="middle" font-size="11" fill="#5F6368">Flask / Django / FastAPI</text>

    <rect x="310" y="116" width="210" height="64" rx="10" fill="#E8F0FE" stroke="#4285F4" stroke-width="1.5"/>
    <text x="415" y="146" text-anchor="middle" font-size="15" font-weight="600" fill="#1A3A6B">Python script</text>
    <text x="415" y="166" text-anchor="middle" font-size="11" fill="#5F6368">data jobs, automation</text>

    <rect x="560" y="116" width="210" height="64" rx="10" fill="#E8F0FE" stroke="#4285F4" stroke-width="1.5"/>
    <text x="665" y="146" text-anchor="middle" font-size="15" font-weight="600" fill="#1A3A6B">CLI / cron job</text>
    <text x="665" y="166" text-anchor="middle" font-size="11" fill="#5F6368">shell, scheduled tasks</text>

    <rect x="810" y="116" width="210" height="64" rx="10" fill="#E8F0FE" stroke="#4285F4" stroke-width="1.5"/>
    <text x="915" y="146" text-anchor="middle" font-size="15" font-weight="600" fill="#1A3A6B">Browser</text>
    <text x="915" y="166" text-anchor="middle" font-size="11" fill="#5F6368">built-in Chat UI  /ui</text>
  </g>

  <!-- arrows: clients -> API -->
  <line x1="165" y1="180" x2="165" y2="222" stroke="#9AA0A6" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="415" y1="180" x2="415" y2="222" stroke="#9AA0A6" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="665" y1="180" x2="665" y2="222" stroke="#9AA0A6" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="915" y1="180" x2="915" y2="222" stroke="#9AA0A6" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="1020" y="206" text-anchor="end" font-size="11" font-style="italic" fill="#80868B">plain JSON over HTTP</text>

  <!-- ===== LAYER 2: HTTP API ===== -->
  <rect x="60" y="226" width="960" height="58" rx="10" fill="#EDE7F6" stroke="#7E57C2" stroke-width="1.5"/>
  <text x="540" y="252" text-anchor="middle" font-size="14" font-weight="600" fill="#4527A0">HTTP API  ·  localhost:7731</text>
  <text x="540" y="272" text-anchor="middle" font-size="11.5" fill="#5F6368">POST /chat &#160;·&#160; POST /task &#160;·&#160; POST /chat/stream (SSE) &#160;·&#160; /tools &#160;·&#160; /sessions &#160;·&#160; /context</text>

  <!-- arrow: API -> core -->
  <line x1="540" y1="284" x2="540" y2="318" stroke="#9AA0A6" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- ===== LAYER 3: CORE ===== -->
  <rect x="60" y="322" width="960" height="150" rx="12" fill="#E6F4EA" stroke="#34A853" stroke-width="1.5"/>
  <text x="80" y="350" font-size="14" font-weight="700" fill="#137333">freeaiagent server  ·  FastAPI</text>
  <text x="1000" y="350" text-anchor="end" font-size="11" fill="#5F6368">owns the LLM plumbing so your apps don't have to</text>

  <!-- core component cards -->
  <g>
    <rect x="80"  y="366" width="223" height="88" rx="8" fill="#FFFFFF" stroke="#A8DAB5" stroke-width="1.5"/>
    <text x="191" y="400" text-anchor="middle" font-size="14" font-weight="600" fill="#137333">Router</text>
    <text x="191" y="422" text-anchor="middle" font-size="11" fill="#5F6368">picks the backend</text>
    <text x="191" y="438" text-anchor="middle" font-size="11" fill="#5F6368">+ model per call</text>

    <rect x="319" y="366" width="223" height="88" rx="8" fill="#FFFFFF" stroke="#A8DAB5" stroke-width="1.5"/>
    <text x="430" y="400" text-anchor="middle" font-size="14" font-weight="600" fill="#137333">Sessions + Context</text>
    <text x="430" y="422" text-anchor="middle" font-size="11" fill="#5F6368">SQLite history per app</text>
    <text x="430" y="438" text-anchor="middle" font-size="11" fill="#5F6368">(X-Caller-ID)</text>

    <rect x="558" y="366" width="223" height="88" rx="8" fill="#FFFFFF" stroke="#A8DAB5" stroke-width="1.5"/>
    <text x="669" y="400" text-anchor="middle" font-size="14" font-weight="600" fill="#137333">Fallback chain</text>
    <text x="669" y="422" text-anchor="middle" font-size="11" fill="#5F6368">local &#8594; ollama &#8594; cloud</text>
    <text x="669" y="438" text-anchor="middle" font-size="11" fill="#5F6368">never leaves you stuck</text>

    <rect x="797" y="366" width="223" height="88" rx="8" fill="#FFFFFF" stroke="#A8DAB5" stroke-width="1.5"/>
    <text x="908" y="400" text-anchor="middle" font-size="14" font-weight="600" fill="#137333">Tool loop</text>
    <text x="908" y="422" text-anchor="middle" font-size="11" fill="#5F6368">calls your HTTP tools,</text>
    <text x="908" y="438" text-anchor="middle" font-size="11" fill="#5F6368">feeds results back</text>
  </g>

  <!-- arrows: core -> backends -->
  <line x1="210" y1="472" x2="210" y2="556" stroke="#9AA0A6" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="540" y1="472" x2="540" y2="556" stroke="#9AA0A6" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="870" y1="472" x2="870" y2="556" stroke="#9AA0A6" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="540" y="498" text-anchor="middle" font-size="11" font-style="italic" fill="#80868B">sends the prompt to whichever backend is available</text>

  <!-- ===== LAYER 4: BACKENDS ===== -->
  <text x="60" y="548" font-size="12" font-weight="700" letter-spacing="1.5" fill="#5F6368">LLM BACKENDS — ALL FREE</text>

  <rect x="60"  y="560" width="300" height="92" rx="10" fill="#FEF7E0" stroke="#F9AB00" stroke-width="1.5"/>
  <text x="210" y="590" text-anchor="middle" font-size="15" font-weight="700" fill="#B06000">Local model  (default)</text>
  <text x="210" y="612" text-anchor="middle" font-size="11.5" fill="#5F6368">llamafile + GGUF  ·  1B–14B</text>
  <text x="210" y="630" text-anchor="middle" font-size="11.5" fill="#5F6368">zero install  ·  fully offline  ·  no key</text>

  <rect x="390" y="560" width="300" height="92" rx="10" fill="#FEF7E0" stroke="#F9AB00" stroke-width="1.5"/>
  <text x="540" y="590" text-anchor="middle" font-size="15" font-weight="700" fill="#B06000">Ollama  (optional)</text>
  <text x="540" y="612" text-anchor="middle" font-size="11.5" fill="#5F6368">if you already run it</text>
  <text x="540" y="630" text-anchor="middle" font-size="11.5" fill="#5F6368">your full Ollama library</text>

  <rect x="720" y="560" width="300" height="92" rx="10" fill="#FEF7E0" stroke="#F9AB00" stroke-width="1.5"/>
  <text x="870" y="590" text-anchor="middle" font-size="15" font-weight="700" fill="#B06000">Free cloud tiers</text>
  <text x="870" y="612" text-anchor="middle" font-size="11.5" fill="#5F6368">Groq · Gemini · OpenRouter</text>
  <text x="870" y="630" text-anchor="middle" font-size="11.5" fill="#5F6368">Together · Cerebras</text>

  <!-- ===== STORAGE BAR ===== -->
  <rect x="60" y="676" width="960" height="46" rx="10" fill="#F1F3F4" stroke="#9AA0A6" stroke-width="1.2"/>
  <text x="540" y="704" text-anchor="middle" font-size="11.5" fill="#5F6368">
    <tspan font-weight="700" fill="#3C4043">Local storage  ~/.freeaiagent/</tspan>&#160;&#160;—&#160;&#160;config.json &#160;·&#160; context.db (history) &#160;·&#160; models/ (GGUF) &#160;·&#160; engine/ (llamafile runtime)
  </text>
</svg>
